name: Deploy to Fly.io

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        # --ha=false: single machine only. The SQLite datastore lives on one
        # volume; a second machine would get its own volume and diverge.
        run: flyctl deploy --remote-only --ha=false --app rotation-dashboard
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
