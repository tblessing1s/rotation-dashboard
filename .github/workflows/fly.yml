name: Deploy to Fly.io

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Prepare infra (idempotent — single machine, data volume)
        # The SQLite datastore lives on ONE volume on ONE machine; a second
        # machine would get its own volume and the two would diverge.
        run: |
          flyctl scale count 1 --yes --app rotation-dashboard || true
          if ! flyctl volumes list --app rotation-dashboard --json | grep -q '"name": *"data"'; then
            flyctl volumes create data --region iad --size 1 --yes --app rotation-dashboard
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --ha=false --app rotation-dashboard
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
