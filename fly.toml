app = "rotation-dashboard"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Persistent state (state.json + parquet cache + Schwab token). Create once with:
#   fly volume create data --region iad --size 1
# Single-writer store: run exactly ONE machine (`fly scale count 1`). A volume
# attaches to only one machine, so 2 machines would need 2 volumes and the data
# would diverge.
[mounts]
  source = "data"
  destination = "/data"

[env]
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep the single machine awake: the in-process alert scheduler (see
  # backend/alert_scheduler.py) must be running at the ET schedule slots to
  # deliver kill-switch/exit alerts. If you'd rather let the machine sleep,
  # set this back to 0 and have an external cron POST /api/alerts/run
  # (auto_start wakes the machine; alert dedup makes repeat runs no-ops).
  #
  # Dead-man's switch: set HEALTHCHECK_URL (fly secrets set HEALTHCHECK_URL=…)
  # to a healthchecks.io ping URL and the scheduler heartbeats it every tick;
  # if this machine stops or the alert thread wedges, that service pages you.
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
