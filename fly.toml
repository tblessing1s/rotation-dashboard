app = "rotation-dashboard"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Persistent datastore (SQLite + state.json). Create once with:
#   fly volumes create data --region iad --size 1
[mounts]
  source = "data"
  destination = "/data"

[env]
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
